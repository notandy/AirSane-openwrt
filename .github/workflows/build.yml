name: Build Airsaned packages

on:
  workflow_call:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        wrtrel:
          - 25.12.2
        sdk:
          - mediatek-filogic

    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout current repository
        uses: actions/checkout@v6

      - name: Build Airsaned package for OpenWRT
        uses: cmangla/gh-action-sdk@pr-hash-fixup-option
        env:
          ARCH: ${{ matrix.sdk }}-${{ matrix.wrtrel }}
          EXTRA_FEEDS: src-git|airsaned|${{ github.server_url }}/${{ github.repository }}.git^${{ github.sha }}
          PACKAGES: airsaned
          FIXUP: 1
          V: w # s=(stdout+stderr), w=warnings, c=commands

      - name: Verify package was built
        run: |
          if ! find bin/packages -name 'airsaned*.apk' -type f | grep -q .; then
            echo "ERROR: No airsaned package found in bin/packages"
            exit 1
          fi
          echo "✓ Package built successfully"
          find bin/packages -name 'airsaned*.apk' -type f -exec ls -lh {} \;

      - name: Obtain full package version
        run: bash ./.github/work.sh pkg-ver airsaned/Makefile | tee $GITHUB_ENV
        shell: bash

      - uses: actions/upload-artifact@v7
        with:
          name: airsaned_${{ env.PKG_FULL_VERSION }}_openwrt-${{ matrix.wrtrel }}_${{ matrix.sdk }}.apk.d
          path: bin/packages/**/airsaned*.apk
          retention-days: 7
          if-no-files-found: error

