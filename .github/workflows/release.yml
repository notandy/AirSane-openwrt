name: Make release when tag is created

on:
  push:
    tags:
      - v*
  workflow_call:
  workflow_dispatch:

jobs:
  build_all:
    uses: ./.github/workflows/build.yml

  release:
    name: Obtain release artifacts
    needs: [build_all]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
      - name: Debug - Check artifact directories
        run: |
          echo "Artifact directories found:"
          find . -type d -name '*.apk.d' || echo "None found"
          echo "Full directory listing:"
          ls -la
      - run: |
          mkdir release-packages
          echo "::group::Extracting packages from artifacts"
          artifact_count=0
          find . -type d -name '*.apk.d' | while IFS= read -r pkd; do
            artifact_count=$((artifact_count + 1))
            cp -v $(find "$pkd" -name '*.apk' -type f) release-packages/${pkd%.d}
          done
          
          if [ $artifact_count -eq 0 ]; then
            echo "WARNING: No artifact directories found"
          fi
          echo "::endgroup::"
          
          if ! find release-packages -name '*.apk' -type f | grep -q .; then
            echo "ERROR: No packages found in release-packages directory"
            echo "Directory contents:"
            ls -la release-packages/ || echo "Directory doesn't exist or is empty"
            exit 1
          fi
          
          echo "::group::Release packages"
          find release-packages -name '*.apk' -type f -exec ls -lh {} \;
          echo "::endgroup::"
      - name: Create new release from tag
        uses: softprops/action-gh-release@v2
        with:
          files: release-packages/*.apk
