name: Make release when tag is created

on:
  push:
    tags:
      - v*
  workflow_call:
  workflow_dispatch:

jobs:
  build_all:
    uses: ./.github/workflows/build.yml

  release:
    name: Obtain release artifacts
    needs: [build_all]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
      - name: Debug - Check artifact directories
        run: |
          echo "Current working directory: $(pwd)"
          echo "Directory contents:"
          find . -maxdepth 2 -type f -o -type d | sort
          echo ""
          echo "Looking for .apk.d directories:"
          find . -name '*.apk.d' -type d
      - run: |
          mkdir -p release-packages
          echo "::group::Extracting packages from artifacts"
          
          # Find all .apk files in artifact directories and copy them
          found_packages=0
          find . -name '*.apk' -type f | while read -r apk_file; do
            found_packages=$((found_packages + 1))
            echo "Found package: $apk_file"
            cp -v "$apk_file" release-packages/
          done
          
          # Also check if anything was copied
          if [ ! -d release-packages ] || [ -z "$(ls -A release-packages/)" ]; then
            echo "ERROR: No packages found in release-packages directory"
            echo "Searching for any .apk files in workspace:"
            find . -name '*.apk' -type f || echo "No .apk files found anywhere"
            exit 1
          fi
          
          echo "::endgroup::"
          echo "::group::Release packages"
          ls -lh release-packages/
          echo "::endgroup::"
      - name: Create new release from tag
        uses: softprops/action-gh-release@v2
        with:
          files: release-packages/*.apk
